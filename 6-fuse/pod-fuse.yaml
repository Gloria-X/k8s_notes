apiVersion: v1
kind: Pod
metadata:
  name: s3-pod
  namespace: default
spec:
  terminationGracePeriodSeconds: 10
  initContainers:
    - name: starter
      restartPolicy: Always
      image: ghcr.io/pfnet-research/meta-fuse-csi-plugin/mfcp-example-proxy-goofys:latest
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash"]
      args:
        [
          "-c",
          "/goofys  --stat-cache-ttl 0 --type-cache-ttl 0 --endpoint https://s3.dev.tiusolution.com -f sit:userId/683 /tmp",
        ]
      env:
        - name: FUSERMOUNT3PROXY_FDPASSING_SOCKPATH
          value: "/fusermount3-proxy/fuse-csi-ephemeral.sock"
        - name: AWS_ACCESS_KEY_ID
          value: "sit"
        - name: AWS_SECRET_ACCESS_KEY
          value: "diamondyu"
      volumeMounts:
        - name: fuse-fd-passing
          mountPath: /fusermount3-proxy
        - name: fuse-csi-ephemeral
          mountPath: /data
          readOnly: False
          mountPropagation: HostToContainer
      startupProbe:
        exec:
          command: ["sh", "-c", "mount | grep /data | grep fuse"]
        failureThreshold: 300
        periodSeconds: 1
  containers:
    - image: ubuntu:22.04
      name: ubuntu
      command: ["sleep"]
      args: ["infinity"]
      volumeMounts:
        - name: fuse-csi-ephemeral
          mountPath: /data
          readOnly: False
          mountPropagation: HostToContainer
  volumes:
    - name: fuse-fd-passing
      emptyDir: {}
    - name: fuse-csi-ephemeral
      csi:
        driver: meta-fuse-csi-plugin.csi.storage.pfn.io
        readOnly: False
        volumeAttributes:
          fdPassingEmptyDirName: fuse-fd-passing
          fdPassingSocketName: fuse-csi-ephemeral.sock

# kubectl apply -f pod-fuse.yaml

# kubectl exec -it s3-pod -c ubuntu -- /bin/bash
