<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DocsAPI 四文件同时预览</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
        }

        .preview-card {
            background-color: #fff;
            flex: 1 1 calc(50% - 20px);
            min-width: 300px;
            height: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .preview-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .preview-card h3 {
            margin: 0;
            padding: 10px 15px;
            background-color: #0078D7;
            color: #fff;
            font-size: 16px;
        }

        .preview-block {
            flex: 1;
            border-top: 1px solid #ddd;
        }

        .preview-block iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 800px) {
            .preview-card {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
<h2>OnlyOffice 四类型文档同时预览</h2>

<div class="container">
    <div class="preview-card">
        <h3>Word 文档</h3>
        <div id="wordPreview" class="preview-block"></div>
    </div>
    <div class="preview-card">
        <h3>Excel 表格</h3>
        <div id="excelPreview" class="preview-block"></div>
    </div>
    <div class="preview-card">
        <h3>PPT 演示文稿</h3>
        <div id="pptPreview" class="preview-block"></div>
    </div>
    <div class="preview-card">
        <h3>PDF 文件</h3>
        <div id="pdfPreview" class="preview-block"></div>
    </div>
</div>

<!-- DocsAPI -->
<script type="text/javascript" src="http://127.0.0.1:9001/web-apps/apps/api/documents/api.js"></script>

<script type="module">
    const SERVER_URL = 'http://192.168.0.102:8000';

    const files = {
        word: { name: 'test.docx', url: `${SERVER_URL}/test.docx`, fileType: 'docx', docType: 'word', mode: 'edit', container: 'wordPreview' },
        excel: { name: 'test.xlsx', url: `${SERVER_URL}/test.xlsx`, fileType: 'xlsx', docType: 'cell', mode: 'edit', container: 'excelPreview' },
        ppt: { name: 'test.pptx', url: `${SERVER_URL}/test.pptx`, fileType: 'pptx', docType: 'slide', mode: 'edit', container: 'pptPreview' },
        pdf: { name: 'test.pdf', url: `${SERVER_URL}/test.pdf`, fileType: 'pdf', docType: 'pdf', mode: 'view', container: 'pdfPreview' }
    };

    Object.values(files).forEach(file => {
        new DocsAPI.DocEditor(file.container, {
            document: { fileType: file.fileType, title: file.name, url: file.url },
            editorConfig: { mode: file.mode },
            documentType: file.docType,
            width: '100%',
            height: '100%'
        });
    });
</script>
</body>
</html>
